# Configuración de Netlify para el monorepo.
# El sitio (panel de administración) vive en la carpeta admin/.
# Netlify entra a `base`, ejecuta el build ahí y publica `base/publish`.
[build]
  base = "admin"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: todas las rutas se sirven desde index.html (React Router).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cabeceras de seguridad razonables.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
