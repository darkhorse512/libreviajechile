# Despliegue en Netlify del panel de administración.
# El contenido de esta carpeta se publica como un sitio cuya RAÍZ es aquí
# (repo "libreviaje-admin"), por eso NO se define `base`. Definir base = "admin"
# rompe el build: Netlify buscaría una subcarpeta admin/ que no existe.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: todas las rutas se sirven desde index.html (React Router).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cabeceras de seguridad razonables.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
