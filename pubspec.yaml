name: libre_viaje_chile
description: "Libre Viaje Chile — App de transporte de pasajeros con ofertas y contraofertas."
publish_to: "none"
version: 0.9.0+13

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.5.6

  # Notificaciones push (opcional — se activa con PUSH_ENABLED=true en .env
  # tras configurar Firebase; ver PUSH_SETUP.md).
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # UI / polish
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10+1

  # Mapas (OpenStreetMap — 100% gratis, sin API key)
  flutter_map: ^7.0.2 # render de tiles OSM
  latlong2: ^0.9.1 # tipo LatLng
  geolocator: ^13.0.1 # ubicación GPS del dispositivo
  google_maps_flutter: ^2.9.0 # mapa de Google (pantalla de inicio, estilo inDrive)

  # Utils
  http: ^1.2.2 # Nominatim (geocoding) + OSRM (rutas)
  intl: ^0.20.2
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon.png

# Íconos de la app (Android + iOS). Generar con:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  # Ícono generado a partir de assets/icon.png (tu marca "ed", sin editar),
  # colocada sobre el fondo oscuro de marca para que se vea íntegra en todos
  # los launchers, incluidos los que fuerzan su propio plato (MIUI/Xiaomi).
  image_path: "assets/gen/icon_launcher.png"
  remove_alpha_ios: true
  background_color_ios: "#12151B"
  adaptive_icon_background: "#12151B"
  adaptive_icon_foreground: "assets/gen/icon_fg.png"
  min_sdk_android: 21
