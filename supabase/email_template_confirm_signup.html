<!-- Pega esto en: Supabase → Authentication → Email Templates → "Confirm signup"
     Lo importante es {{ .Token }} = el código de 6 dígitos.
     Asunto sugerido: Tu código de verificación · Libre Viaje Chile -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f7f3;padding:32px 16px;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <tr><td align="center">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#ffffff;border-radius:20px;overflow:hidden;border:1px solid #e1e7dd;">
      <tr>
        <td style="background:linear-gradient(135deg,#63CE33,#3FA81C);padding:26px 32px;">
          <span style="color:#ffffff;font-size:22px;font-weight:800;">Libre Viaje Chile</span>
        </td>
      </tr>
      <tr>
        <td style="padding:32px;">
          <h1 style="margin:0 0 8px;font-size:22px;color:#0e1e14;">Verifica tu correo</h1>
          <p style="margin:0 0 24px;font-size:15px;line-height:1.5;color:#566159;">
            ¡Bienvenido a bordo! Ingresa este código en la app para activar tu cuenta:
          </p>
          <div style="text-align:center;margin:8px 0 24px;">
            <div style="display:inline-block;background:#eaf8e1;border:1px solid #cfeabf;border-radius:14px;padding:18px 28px;">
              <span style="font-size:34px;font-weight:800;letter-spacing:10px;color:#3c9a1e;">{{ .Token }}</span>
            </div>
          </div>
          <p style="margin:0;font-size:13px;line-height:1.5;color:#8b968c;">
            El código vence en 1 hora. Si no fuiste tú, ignora este correo.
          </p>
        </td>
      </tr>
      <tr>
        <td style="padding:18px 32px;background:#f4f7f3;border-top:1px solid #e1e7dd;">
          <span style="font-size:12px;color:#8b968c;">Viaja libre. Llega lejos. · Libre Viaje Chile</span>
        </td>
      </tr>
    </table>
  </td></tr>
</table>
